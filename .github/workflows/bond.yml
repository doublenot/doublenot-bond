# Generated by doublenot-bond from .bond/config.yml.
# Refresh with: doublenot-bond --prompt "/setup workflow refresh"
# Model reasoning:
# medium
name: bond

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: bond-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bond:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build repo-local bond runtime
        shell: bash
        run: |
          set -euo pipefail
          cargo build --locked --bin doublenot-bond
          mkdir -p .bond/bin
          cp target/debug/doublenot-bond .bond/bin/doublenot-bond
          chmod +x .bond/bin/doublenot-bond

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run scheduled bond issue workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: ./.bond/bin/doublenot-bond --repo . --run-scheduled-issue
