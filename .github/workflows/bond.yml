# Generated by doublenot-bond from .bond/config.yml.
# Refresh with: doublenot-bond --prompt "/setup workflow refresh"
# Thinking effort: medium
name: bond

on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: bond-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bond:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build repo-local bond runtime
        shell: bash
        run: |
          set -euo pipefail
          cargo build --locked --bin doublenot-bond
          mkdir -p .bond/bin
          cp target/debug/doublenot-bond .bond/bin/doublenot-bond
          chmod +x .bond/bin/doublenot-bond

      - name: Configure git identity
        run: |
          git config user.name "doublenot-bond[bot]"
          git config user.email "doublenot-bond[bot]@users.noreply.github.com"

      - name: Run scheduled bond issue workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: ./.bond/bin/doublenot-bond --repo . --run-scheduled-issue

      - name: Verify repo changes before commit
        shell: bash
        run: |
          set -euo pipefail

          read_scheduled_target() {
            if [[ ! -f .bond/state.yml ]]; then
              return 0
            fi

            local target_block
            target_block="$(sed -n '/^scheduled_target:$/,/^[^ ]/p' .bond/state.yml)"
            if [[ -z "$target_block" ]]; then
              return 0
            fi

            SCHEDULED_TARGET_KIND="$(printf '%s\n' "$target_block" | sed -n 's/^  kind: //p' | head -n 1)"
          }

          read_scheduled_target || true

          if [[ "${SCHEDULED_TARGET_KIND:-}" == "merge_wait" ]]; then
            echo "Scheduled run is waiting for merge or approval. Skipping verification."
            exit 0
          fi

          if [[ -z "$(git status --short)" ]]; then
            echo "No changes to verify."
            exit 0
          fi

          echo "Running configured lint commands."
          printf '> %s\n' 'cargo fmt -- --check'
          'cargo' 'fmt' '--' '--check'
          printf '> %s\n' 'cargo clippy --all-targets -- -D warnings'
          'cargo' 'clippy' '--all-targets' '--' '-D' 'warnings'
          echo "Running configured test commands."
          printf '> %s\n' 'cargo test'
          'cargo' 'test'

      - name: Inspect scheduled publish state
        id: scheduled_publish_state
        shell: bash
        run: |
          set -euo pipefail

          read_scheduled_target() {
            if [[ ! -f .bond/state.yml ]]; then
              return 0
            fi

            local target_block
            target_block="$(sed -n '/^scheduled_target:$/,/^[^ ]/p' .bond/state.yml)"
            if [[ -z "$target_block" ]]; then
              return 0
            fi

            SCHEDULED_TARGET_KIND="$(printf '%s\n' "$target_block" | sed -n 's/^  kind: //p' | head -n 1)"
          }

          read_scheduled_target || true

          if [[ "${SCHEDULED_TARGET_KIND:-}" == "merge_wait" ]]; then
            echo "needs_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -z "$(git status --short)" ]]; then
            echo "needs_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "needs_publish=true" >> "$GITHUB_OUTPUT"

      - name: Validate bond write credentials
        if: steps.scheduled_publish_state.outputs.needs_publish == 'true'
        shell: bash
        env:
          BOND_GITHUB_APP_ID: ${{ secrets.BOND_GITHUB_APP_ID }}
          BOND_GITHUB_APP_PRIVATE_KEY: ${{ secrets.BOND_GITHUB_APP_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          if [[ -z "${BOND_GITHUB_APP_ID:-}" ]]; then
            echo "Missing required secret BOND_GITHUB_APP_ID for scheduled bond writes." >&2
            exit 1
          fi

          if [[ -z "${BOND_GITHUB_APP_PRIVATE_KEY:-}" ]]; then
            echo "Missing required secret BOND_GITHUB_APP_PRIVATE_KEY for scheduled bond writes." >&2
            exit 1
          fi

      - name: Mint bond write token
        if: steps.scheduled_publish_state.outputs.needs_publish == 'true'
        id: bond_write_token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.BOND_GITHUB_APP_ID }}
          private-key: ${{ secrets.BOND_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Commit, push, and open PR
        if: steps.scheduled_publish_state.outputs.needs_publish == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ steps.bond_write_token.outputs.token }}
          BOND_WRITE_TOKEN: ${{ steps.bond_write_token.outputs.token }}
        run: |
          set -euo pipefail

          read_scheduled_target() {
            if [[ ! -f .bond/state.yml ]]; then
              return 0
            fi

            local target_block
            target_block="$(sed -n '/^scheduled_target:$/,/^[^ ]/p' .bond/state.yml)"
            if [[ -z "$target_block" ]]; then
              return 0
            fi

            SCHEDULED_TARGET_KIND="$(printf '%s\n' "$target_block" | sed -n 's/^  kind: //p' | head -n 1)"
            ISSUE_NUMBER="$(printf '%s\n' "$target_block" | sed -n 's/^  issue_number: //p' | head -n 1)"
            ISSUE_TITLE="$(printf '%s\n' "$target_block" | sed -n 's/^  issue_title: //p' | head -n 1)"
            ISSUE_BRANCH="$(printf '%s\n' "$target_block" | sed -n 's/^  branch_name: //p' | head -n 1)"

            ISSUE_TITLE="${ISSUE_TITLE#\"}"
            ISSUE_TITLE="${ISSUE_TITLE%\"}"
            ISSUE_BRANCH="${ISSUE_BRANCH#\"}"
            ISSUE_BRANCH="${ISSUE_BRANCH%\"}"
          }

          read_scheduled_target || true

          if [[ "${SCHEDULED_TARGET_KIND:-}" == "merge_wait" ]]; then
            echo "Scheduled run is waiting for merge or approval. Skipping commit."
            exit 0
          fi

          if [[ -z "$(git status --short)" ]]; then
            echo "No changes to commit."
            exit 0
          fi

          if [[ -z "${ISSUE_NUMBER:-}" || -z "${ISSUE_BRANCH:-}" ]]; then
            echo "Changed files but no persisted scheduled target metadata was found."
            exit 1
          fi

          if [[ "$(git branch --show-current)" != "$ISSUE_BRANCH" ]]; then
            git checkout -b "$ISSUE_BRANCH"
          fi

          git add -A

          if git diff --cached --quiet; then
            echo "No staged changes to commit."
            exit 0
          fi

          git commit -m "bond: work on #$ISSUE_NUMBER"
          git push "https://x-access-token:${BOND_WRITE_TOKEN}@github.com/${{ github.repository }}.git" "$ISSUE_BRANCH"

          existing_pr="$(gh pr list --head "$ISSUE_BRANCH" --base "${{ github.ref_name }}" --json number --jq '.[0].number')"
          if [[ -n "$existing_pr" && "$existing_pr" != "null" ]]; then
            echo "PR #$existing_pr already exists for $ISSUE_BRANCH."
            exit 0
          fi

          pr_title="bond: resolve #$ISSUE_NUMBER"
          if [[ -n "${ISSUE_TITLE:-}" ]]; then
            pr_title="$pr_title $ISSUE_TITLE"
          fi

          pr_body=$(printf 'Closes #%s\n\nAutomated changes from doublenot-bond.\n' "$ISSUE_NUMBER")

          gh pr create --base "${{ github.ref_name }}" --head "$ISSUE_BRANCH" --title "$pr_title" --body "$pr_body"

