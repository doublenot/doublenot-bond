name: release

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            binary: doublenot-bond
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            archive: tar.gz
            binary: doublenot-bond
          - runner: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
            binary: doublenot-bond
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            binary: doublenot-bond.exe

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v5

      - name: Verify tag matches Cargo.toml version
        shell: bash
        run: |
          set -euo pipefail
          manifest_version="$(sed -n '/^\[package\]$/,/^\[/ s/^version = "\([^"]*\)"$/\1/p' Cargo.toml | head -n 1)"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ -z "$manifest_version" ]; then
            echo "failed to read package.version from Cargo.toml" >&2
            exit 1
          fi
          if [ "$manifest_version" != "$tag_version" ]; then
            echo "tag version v$tag_version does not match Cargo.toml version $manifest_version" >&2
            exit 1
          fi

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev zip

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package Unix archive
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          artifact="doublenot-bond-${{ matrix.target }}"
          mkdir -p "$artifact"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "$artifact/"
          cp README.md "$artifact/"
          cp install.sh "$artifact/"
          tar -czf "${artifact}.tar.gz" "$artifact"

      - name: Package Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $artifact = "doublenot-bond-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $artifact | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" "$artifact/"
          Copy-Item README.md "$artifact/"
          Copy-Item install.ps1 "$artifact/"
          Compress-Archive -Path "$artifact/*" -DestinationPath "${artifact}.zip"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: doublenot-bond-${{ matrix.target }}.${{ matrix.archive }}

  source:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Verify tag matches Cargo.toml version
        shell: bash
        run: |
          set -euo pipefail
          manifest_version="$(sed -n '/^\[package\]$/,/^\[/ s/^version = "\([^"]*\)"$/\1/p' Cargo.toml | head -n 1)"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ -z "$manifest_version" ]; then
            echo "failed to read package.version from Cargo.toml" >&2
            exit 1
          fi
          if [ "$manifest_version" != "$tag_version" ]; then
            echo "tag version v$tag_version does not match Cargo.toml version $manifest_version" >&2
            exit 1
          fi

      - name: Create source archive
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          prefix="doublenot-bond-${version}/"
          git archive --format=tar.gz --prefix="$prefix" -o "doublenot-bond-${version}.tar.gz" HEAD

      - name: Upload source workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-source
          path: doublenot-bond-${{ github.ref_name }}.tar.gz

  checksums:
    needs:
      - build
      - source
    runs-on: ubuntu-latest

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Build checksums file
        shell: bash
        run: |
          set -euo pipefail
          cd artifacts
          find . -maxdepth 1 -type f \( -name '*.tar.gz' -o -name '*.zip' \) -print0 | sort -z | xargs -0 sha256sum | sed 's# \./# #' > ../doublenot-bond-checksums.txt

      - name: Upload checksum workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-checksums
          path: doublenot-bond-checksums.txt

  publish:
    needs:
      - build
      - source
      - checksums
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Verify tag matches Cargo.toml version
        shell: bash
        run: |
          set -euo pipefail
          manifest_version="$(sed -n '/^\[package\]$/,/^\[/ s/^version = "\([^"]*\)"$/\1/p' Cargo.toml | head -n 1)"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ -z "$manifest_version" ]; then
            echo "failed to read package.version from Cargo.toml" >&2
            exit 1
          fi
          if [ "$manifest_version" != "$tag_version" ]; then
            echo "tag version v$tag_version does not match Cargo.toml version $manifest_version" >&2
            exit 1
          fi

      - name: Install Linux build dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev zip

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Validate crates.io publication readiness
        shell: bash
        run: |
          set -euo pipefail
          cargo publish --dry-run --locked

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Verify release artifact set
        shell: bash
        run: |
          set -euo pipefail
          expected_files=(
            "doublenot-bond-x86_64-unknown-linux-gnu.tar.gz"
            "doublenot-bond-x86_64-apple-darwin.tar.gz"
            "doublenot-bond-aarch64-apple-darwin.tar.gz"
            "doublenot-bond-x86_64-pc-windows-msvc.zip"
            "doublenot-bond-${GITHUB_REF_NAME}.tar.gz"
            "doublenot-bond-checksums.txt"
          )

          for file in "${expected_files[@]}"; do
            if [[ ! -f "release-artifacts/$file" ]]; then
              echo "missing expected release artifact: $file" >&2
              exit 1
            fi
          done

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/*

      - name: Verify crates.io credentials
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${CARGO_REGISTRY_TOKEN:-}" ]]; then
            echo "Missing required secret CARGO_REGISTRY_TOKEN for crates.io publication." >&2
            exit 1
          fi

      - name: Publish crate to crates.io
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          cargo publish --locked
